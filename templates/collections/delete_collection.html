{% extends "base.html" %}
{% block title %}Delete collection · BookWorld{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
    <h4 class="mb-3 text-center">Delete Collection</h4>
    <p class="text-center text-muted">
      Are you sure you want to delete "{{ object.title }}"?
    </p>

    <form method="post" class="d-grid gap-2 mt-3">
      {% csrf_token %}
      <button class="btn btn-danger">Delete</button>
      <a href="{% url 'collections:details' object.collection_slug %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
