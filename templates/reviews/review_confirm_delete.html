{% extends "base.html" %}
{% block title %}Delete Review · BookWorld{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <h2 class="form-title">Delete Review</h2>

    <p class="mb-4">
      Are you sure you want to delete this review?
    </p>

    <div class="mb-4">
      <strong>Rating:</strong> {{ object.rating }}/5
      <p class="mt-2 mb-0">{{ object.text }}</p>
    </div>

    <form method="post">
      {% csrf_token %}

      <div class="form-actions">
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'books:details' slug=object.book.book_slug %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
