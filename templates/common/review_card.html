{% load account_extras %}

<article class="review-card">
  <div class="review-main">
    <div class="review-content">
      <div class="review-meta">
        <strong class="d-block review-author">{{ review.author|display_name }}</strong>
        <span class="text-muted small">
          {{ review.date_of_publication|date:"d M Y" }}
        </span>
      </div>

      <p class="review-text">{{ review.text }}</p>
    </div>

    <div class="review-side">
      <span class="badge text-bg-light review-rating-badge">★ {{ review.rating }}/5</span>

      {% if request.user == review.author or request.user.is_superuser %}
        <div class="review-actions">
          {% if request.user == review.author %}
            <a href="{% url 'reviews:edit' review.pk %}" class="btn btn-outline-secondary btn-sm">Edit</a>
          {% endif %}

          <a href="{% url 'reviews:delete' review.pk %}" class="btn btn-outline-danger btn-sm">Delete</a>
        </div>
      {% endif %}
    </div>
  </div>
</article>
