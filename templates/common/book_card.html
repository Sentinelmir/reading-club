<div class="col-md-6 col-lg-3">
  <div class="card h-100 shadow-sm border-0">
    {% if book.book_cover %}
      <img src="{{ book.book_cover.url }}"
           class="card-img-top"
           alt="{{ book.name }}"
           style="height: 320px; object-fit: cover;">
    {% else %}
      <img src="https://via.placeholder.com/500x650"
           class="card-img-top"
           alt="No cover"
           style="height: 320px; object-fit: cover;">
    {% endif %}

    <div class="card-body d-flex flex-column">
      <h3 class="h6 mb-1">{{ book.name }}</h3>

      <p class="small text-muted mb-2">
        {% if book.author %}
          {{ book.author }}
        {% else %}
          Unknown author
        {% endif %}
      </p>

      <p class="small text-muted mb-2">{{ book.get_genre_display }}</p>

      <p class="small text-muted mb-3">
        Rating:
        {% if book.average_rating %}
          {{ book.average_rating }}
        {% else %}
          No rating
        {% endif %}
      </p>

      <div class="mt-auto d-flex justify-content-between">
        <button class="btn btn-sm btn-outline-danger">♥</button>
        <a href="{% url 'books:details' book.book_slug %}" class="btn btn-sm btn-outline-secondary">
          Details
        </a>
      </div>
    </div>
  </div>
</div>
