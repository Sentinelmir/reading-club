{% extends "base.html" %}
{% block title %}Books · BookWorld{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">Books</h1>
    <p class="text-muted mb-0">Browse all books and filter them by genre.</p>
  </div>
  <a href="{% url 'books:add' %}" class="btn btn-primary">Add book</a>
</div>

<div class="card border-0 shadow-sm mb-4">
  <div class="card-body">
    <form class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Genre</label>
        <select class="form-select">
          <option>All genres</option>
          <option>Fantasy</option>
          <option>Drama</option>
          <option>Romance</option>
          <option>Science</option>
          <option>History</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Search</label>
        <input type="text" class="form-control" placeholder="Search by title">
      </div>

      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary me-2" type="submit">Apply</button>
        <a href="#" class="btn btn-outline-secondary">Reset</a>
      </div>
    </form>
  </div>
</div>

<div class="row g-4">
  {% for book in books %}
    {% include "common/book_card.html" %}
  {% empty %}
    <div class="col-12">
      <div class="alert alert-info mb-0">
        No books found.
      </div>
    </div>
  {% endfor %}
</div>
</div>
{% endblock %}
